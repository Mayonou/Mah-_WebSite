<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mahé Richard-Schmidt — Monteur Vidéo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Outfit:wght@100;200&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a09;
      --white: #f0ede8;
      --muted: #555550;
      --accent: #c8b89a;
      --line: #1e1e1c;
    }

    html { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      cursor: none;
      overflow-x: hidden;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      mix-blend-mode: difference;
      left: -80px; top: -80px;
      transform: translate(-50%, -50%);
      transition: width .2s ease, height .2s ease;
    }
    #cursor::before, #cursor::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 32px; height: 2px;
      background: rgba(255,255,255,0.9);
      transform-origin: center;
    }
    #cursor::before { transform: translate(-50%, -50%) rotate(45deg); }
    #cursor::after  { transform: translate(-50%, -50%) rotate(-45deg); }
    #cursor.hover::before { width: 20px; }
    #cursor.hover::after  { width: 20px; }

    /* ── Sticky name layer ── */
    #name-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }
    #name-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 18vw, 260px);
      letter-spacing: .04em;
      color: var(--white);
      mix-blend-mode: overlay;
      opacity: .18;
      white-space: nowrap;
      will-change: transform;
      /* starts centered, moves up on scroll */
      transform: translateY(0px);
    }

    /* ── Header ── */
    #hdr {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 28px 48px;
      mix-blend-mode: normal;
    }
    .hdr-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 100;
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .hdr-contact {
      font-size: .62rem;
      letter-spacing: .08em;
      color: var(--muted);
      text-align: right;
      line-height: 1.9;
    }
    .hdr-contact a { color: inherit; text-decoration: none; transition: color .2s; }
    .hdr-contact a:hover { color: var(--white); }

    /* ── Scroll container ── */
    #projects {
      padding-top: 0;
    }

    /* ── Project strip ── */
    .project {
      position: relative;
      width: 100%;
      /* 32/9 aspect ratio */
      aspect-ratio: 32 / 9;
      overflow: hidden;
      cursor: none;
      border-bottom: 1px solid var(--line);
      transition: aspect-ratio .55s cubic-bezier(.23,1,.32,1);
    }

    .project:first-child { border-top: 1px solid var(--line); }

    /* Hover: taller strip */
    .project:hover {
      aspect-ratio: 32 / 12;
    }

    /* Video / media fill */
    .project-media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* slight scale so edges don't show on hover expand */
      transform: scale(1.03);
      transition: transform .6s cubic-bezier(.23,1,.32,1), filter .4s ease;
      filter: brightness(.75) saturate(.9);
    }
    .project:hover .project-media {
      transform: scale(1.0);
      filter: brightness(.55) saturate(1.1);
    }

    /* Overlay gradient */
    .project-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(10,10,9,.7) 0%,
        rgba(10,10,9,.0) 40%,
        rgba(10,10,9,.0) 60%,
        rgba(10,10,9,.4) 100%
      );
      z-index: 2;
      transition: opacity .4s ease;
    }
    .project:hover .project-overlay { opacity: .6; }

    /* Project info */
    .project-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 24px 48px;
    }
    .project-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 3.5vw, 3.2rem);
      letter-spacing: .06em;
      color: var(--white);
      line-height: 1;
      transform: translateY(4px);
      transition: transform .35s ease, opacity .35s ease;
      opacity: .85;
    }
    .project:hover .project-title {
      transform: translateY(0);
      opacity: 1;
    }
    .project-meta {
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: right;
      line-height: 2;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .35s ease .05s, transform .35s ease .05s;
    }
    .project:hover .project-meta {
      opacity: 1;
      transform: translateY(0);
    }

    /* Click arrow indicator */
    .project-cta {
      position: absolute;
      top: 50%; right: 48px;
      transform: translateY(-50%) translateX(8px);
      z-index: 4;
      font-size: .58rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0;
      transition: opacity .3s ease .1s, transform .3s ease .1s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .project-cta::after {
      content: '→';
      font-size: 1.1rem;
    }
    .project:hover .project-cta {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    /* ── Index numbers ── */
    .project-index {
      position: absolute;
      top: 22px; left: 48px;
      z-index: 4;
      font-size: .58rem;
      letter-spacing: .14em;
      color: var(--muted);
      opacity: 0;
      transition: opacity .3s ease;
    }
    .project:hover .project-index { opacity: 1; }

    /* ── Footer gap ── */
    #footer {
      height: 40px;
      border-top: none;
    }

  </style>
</head>
<body>

<div id="cursor"></div>

<!-- Floating name -->
<div id="name-wrap">
  <div id="name-text">MAHÉ</div>
</div>

<!-- Header -->
<header id="hdr">
  <div class="hdr-title">Monteur Vidéo</div>
  <div class="hdr-contact">
    <a href="mailto:maherichardschmidt@gmail.com">maherichardschmidt@gmail.com</a><br>
    <a href="tel:+33671451971">+33 6 71 45 19 71</a>
  </div>
</header>

<!-- Projects -->
<div id="projects"></div>
<div id="footer"></div>

<script>
// ═══════════════════════════════════════════════════
// ↓↓↓  TES PROJETS — modifie ici  ↓↓↓
//
// clip: chemin vers ton fichier vidéo ou gif (ex: "clips/pouf.mp4")
//       → mets tes fichiers dans un dossier /clips/ à côté de index.html
//
// Pour la page projet, chaque entrée génère un lien vers project.html?id=xxx
// ═══════════════════════════════════════════════════
const projects = [
  {
    id: "pouf",
    title: "POUF",
    real: "Mahé RICHARD-SCHMIDT",
    year: "2025",
    clip: "clips/pouf.mp4",          // ← remplace par ton fichier
    youtubeId: "XYP9Ufletss",
  },
  {
    id: "neoma",
    title: "Neoma",
    real: "Nicolas ROMIEU",
    year: "2023",
    clip: "clips/neoma.mp4",
    youtubeId: "I80fSVbp-eE",
  },
  {
    id: "garage-lmr",
    title: "Garage LMR",
    real: "Nicolas ROMIEU",
    year: "2023",
    clip: "clips/garage-lmr.mp4",
    youtubeId: "muCyrhqdBwA",
  },
  {
    id: "renee-costes",
    title: "Renée Costes",
    real: "Nicolas ROMIEU",
    year: "2023",
    clip: "clips/renee-costes.mp4",
    youtubeId: "XqMseG4eQ9o",
  },
  {
    id: "albert-koski",
    title: "Albert Koski",
    real: "Nicolas ROMIEU",
    year: "2022",
    clip: "clips/albert-koski.mp4",
    youtubeId: "XTDjJ9pvYJI",
  },
  {
    id: "crash-mali",
    title: "Crash au Mali",
    real: "",
    year: "2023",
    clip: "clips/crash-mali.mp4",
    youtubeId: "VEVohpQye-I",
  },
  {
    id: "luke-anger",
    title: "Luke Anger — Continuum",
    real: "Nicolas ROMIEU",
    year: "2023",
    clip: "clips/luke-anger.mp4",
    youtubeId: "nUmqWk7Q4no",
  },
  {
    id: "chine-ping-pong",
    title: "La Chine et le Ping-Pong",
    real: "",
    year: "2024",
    clip: "clips/chine-ping-pong.mp4",
    youtubeId: "TVLk2qBD0DM",
  },
  {
    id: "centaines-de-roses",
    title: "Murphy × Frank Takuma",
    real: "Léo VIEIRA",
    year: "2024",
    clip: "clips/centaines-de-roses.mp4",
    youtubeId: "Nog0dxvLhQY",
  },
];
// ═══════════════════════════════════════════════════

// Build project strips
const container = document.getElementById('projects');

projects.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'project';
  el.dataset.id = p.id;

  // Media (video or gif)
  const isGif = p.clip && p.clip.endsWith('.gif');
  let media;
  if (isGif) {
    media = document.createElement('img');
    media.src = p.clip;
    media.alt = p.title;
  } else {
    media = document.createElement('video');
    media.src = p.clip;
    media.autoplay = true;
    media.muted = true;
    media.loop = true;
    media.playsInline = true;
    media.preload = 'metadata';
  }
  media.className = 'project-media';

  // Overlay
  const overlay = document.createElement('div');
  overlay.className = 'project-overlay';

  // Index number
  const idx = document.createElement('div');
  idx.className = 'project-index';
  idx.textContent = String(i + 1).padStart(2, '0');

  // Info
  const info = document.createElement('div');
  info.className = 'project-info';

  const title = document.createElement('div');
  title.className = 'project-title';
  title.textContent = p.title;

  const meta = document.createElement('div');
  meta.className = 'project-meta';
  if (p.real) meta.innerHTML = `Réal. ${p.real}<br>${p.year}`;
  else meta.textContent = p.year;

  info.appendChild(title);
  info.appendChild(meta);

  // CTA
  const cta = document.createElement('div');
  cta.className = 'project-cta';
  cta.textContent = 'Voir le projet';

  // Overlay for cursor (prevents iframe-like issues with video)
  const pointerOverlay = document.createElement('div');
  pointerOverlay.style.cssText = 'position:absolute;inset:0;z-index:5;cursor:none;';

  el.appendChild(media);
  el.appendChild(overlay);
  el.appendChild(idx);
  el.appendChild(info);
  el.appendChild(cta);
  el.appendChild(pointerOverlay);

  // Click → project page
  el.addEventListener('click', () => {
    window.location.href = `project.html?id=${p.id}`;
  });

  container.appendChild(el);
});

// ── Cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// Cursor hover state on projects
document.querySelectorAll('.project').forEach(p => {
  p.addEventListener('mouseenter', () => cursor.classList.add('hover'));
  p.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});

// ── Parallax name — infinite loop scroll up ──
const nameEl = document.getElementById('name-text');
const nameWrap = document.getElementById('name-wrap');

// Total scroll height of a single "name cycle" in px
// We use window.innerHeight so one full scroll = one full cycle
function updateName() {
  const scrollY = window.scrollY;
  const viewH = window.innerHeight;

  // Move upward as user scrolls, loop with modulo
  // Start at center (0), go up by scroll amount, loop every viewH px
  const offset = scrollY % viewH;

  // Map offset: 0 → center (0), viewH → top (-viewH)
  // then jump back to bottom (+viewH) seamlessly
  let y = -offset;

  // If we're past halfway through cycle, show coming from bottom
  // This creates the illusion of continuous looping
  nameEl.style.transform = `translateY(${y}px)`;

  // When offset is near 0 (just looped), briefly show from bottom
  // We add a ghost element approach: duplicate translateY
  if (offset > viewH * 0.85) {
    // Blend: current going off top + next coming from bottom
    // We use a wrapper trick: show at y AND y + viewH
    nameEl.style.transform = `translateY(${y}px)`;
  }
}

// Use two elements to fake infinite loop
const nameEl2 = nameEl.cloneNode(true);
nameEl2.id = 'name-text-2';
nameEl2.style.position = 'absolute';
nameWrap.appendChild(nameEl2);

function updateNameLoop() {
  const scrollY = window.scrollY;
  const viewH = window.innerHeight;

  const offset = scrollY % viewH;
  const y1 = offset;             // descend quand on scroll vers le bas
  const y2 = offset - viewH;    // le doublon arrive par le haut pour la boucle

  nameEl.style.transform  = `translateY(${y1}px)`;
  nameEl2.style.transform = `translateY(${y2}px)`;
}

window.addEventListener('scroll', updateNameLoop, { passive: true });
updateNameLoop();

</script>
</body>
</html>
<!DOCTYPE html>
<html lang="fr">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a09;
      --white: #f0ede8;
      --muted: #555550;
      --accent: #c8b89a;
      --line: #1e1e1c;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      cursor: none;
      overflow: hidden;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      mix-blend-mode: difference;
      left: -80px; top: -80px;
      transform: translate(-50%, -50%);
    }
    #cursor::before, #cursor::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 32px; height: 2px;

      transform-origin: center;
    }
    #cursor::before { transform: translate(-50%, -50%) rotate(45deg); }
    #cursor::after  { transform: translate(-50%, -50%) rotate(-45deg); }

    /* ── Layout ── */
    #shell {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      height: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-bottom: 1px solid var(--line);

    }
    @keyframes fadeDown {

    #back-btn {

    }
    #back-btn:hover { color: var(--white); }
    #back-btn::before { content: '←'; font-size: 1rem; }

    #project-title-bar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .08em;
      color: var(--white);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    #project-meta-bar {
      font-size: .6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      line-height: 2;
    }

    /* ── Video area ── */
    #video-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      animation: fadeIn .6s ease .15s both;
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    #video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Bottom bar ── */
    #bottombar {
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-top: 1px solid var(--line);
      animation: fadeUp .5s ease .1s both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .bottombar-label {
      font-size: .58rem;
      letter-spacing: .16em;

      color: var(--muted);
    }

    /* Prev / Next navigation */
    #nav-btns {
      display: flex;
      gap: 32px;
    }
    .nav-btn {
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      cursor: none;
      transition: color .2s;
      display: flex;

    .nav-btn.prev::before { content: '←'; }

    /* 404 state */
    #not-found {
      display: none;
      position: fixed; inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;

    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="not-found">
  Projet introuvable
  <a href="index.html">← Retour</a>
</div>

<div id="shell">
  <div id="topbar">
    <a id="back-btn" href="index.html">Retour</a>
    <div id="project-title-bar"></div>
    <div id="project-meta-bar"></div>
  </div>

  <div id="video-wrap">
    <iframe id="yt-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <div id="bottombar">
    <div class="bottombar-label">Mahé Richard-Schmidt — Monteur Vidéo</div>
    <div id="nav-btns"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// Même liste que dans index.html — garde-les synchronisées
// ═══════════════════════════════════════════════════
const projects = [
  { id: "pouf",              title: "POUF",                          real: "Mahé RICHARD-SCHMIDT", year: "2025", youtubeId: "XYP9Ufletss" },
  { id: "neoma",             title: "Neoma",                         real: "Nicolas ROMIEU",       year: "2023", youtubeId: "I80fSVbp-eE" },
  { id: "garage-lmr",        title: "Garage LMR",                    real: "Nicolas ROMIEU",       year: "2023", youtubeId: "muCyrhqdBwA" },
  { id: "renee-costes",      title: "Renée Costes",                  real: "Nicolas ROMIEU",       year: "2023", youtubeId: "XqMseG4eQ9o" },
  { id: "albert-koski",      title: "Albert Koski",                  real: "Nicolas ROMIEU",       year: "2022", youtubeId: "XTDjJ9pvYJI" },
  { id: "crash-mali",        title: "Crash au Mali",                 real: "",                     year: "2023", youtubeId: "VEVohpQye-I" },
  { id: "luke-anger",        title: "Luke Anger — Continuum",        real: "Nicolas ROMIEU",       year: "2023", youtubeId: "nUmqWk7Q4no" },
  { id: "chine-ping-pong",   title: "La Chine et le Ping-Pong",      real: "",                     year: "2024", youtubeId: "TVLk2qBD0DM" },
  { id: "centaines-de-roses",title: "Murphy × Frank Takuma",         real: "Léo VIEIRA",           year: "2024", youtubeId: "Nog0dxvLhQY" },
];

// Parse URL param
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const idx = projects.findIndex(p => p.id === id);

if (idx === -1) {
  document.getElementById('shell').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
} else {
  const p = projects[idx];

  // Title & meta
  document.title = `${p.title} — Mahé Richard-Schmidt`;
  document.getElementById('project-title-bar').textContent = p.title;
  const meta = document.getElementById('project-meta-bar');
  if (p.real) meta.innerHTML = `Réal. ${p.real}<br>${p.year}`;
  else meta.textContent = p.year;

  // YouTube embed
  const player = document.getElementById('yt-player');
  player.src = `https://www.youtube.com/embed/${p.youtubeId}?autoplay=1&rel=0&modestbranding=1`;

  // Prev / Next
  const nav = document.getElementById('nav-btns');
  if (idx > 0) {
    const prev = projects[idx - 1];
    const a = document.createElement('a');
    a.className = 'nav-btn prev';
    a.href = `project.html?id=${prev.id}`;
    a.textContent = prev.title;
    nav.appendChild(a);
  }
  if (idx < projects.length - 1) {
    const next = projects[idx + 1];
    const a = document.createElement('a');
    a.className = 'nav-btn next';
    a.href = `project.html?id=${next.id}`;
    a.textContent = next.title;
    nav.appendChild(a);
  }
}

// ── Cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
</script>
</body>
</html>
